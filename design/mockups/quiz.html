<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Quiz - SmartNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0F0E0C;
            color: #E8E4DD;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .quiz-container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }
        
        /* Progress Bar */
        .progress-bar {
            background: rgba(26, 24, 21, 0.7);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #B87333 0%, #FFB347 100%);
            height: 100%;
            width: 40%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 179, 71, 0.5);
        }
        
        /* Quiz Card */
        .quiz-card {
            background: rgba(26, 24, 21, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(184, 115, 51, 0.2);
            border-radius: 1rem;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .question-number {
            color: #B87333;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        
        h2 {
            font-family: 'Manrope', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #F7F5F2;
            margin-bottom: 2rem;
        }
        
        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .option {
            background: rgba(58, 52, 42, 0.3);
            border: 2px solid transparent;
            border-radius: 0.75rem;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .option:hover {
            background: rgba(58, 52, 42, 0.5);
            border-color: rgba(184, 115, 51, 0.3);
            transform: translateX(5px);
        }
        
        .option.selected {
            background: rgba(184, 115, 51, 0.2);
            border-color: #B87333;
            box-shadow: 0 0 20px rgba(184, 115, 51, 0.3);
        }
        
        .option-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #B87333, #FFB347);
            border-radius: 0.5rem;
            flex-shrink: 0;
        }
        
        .option-content h3 {
            font-family: 'Manrope', sans-serif;
            font-size: 1.125rem;
            color: #E8E4DD;
            margin-bottom: 0.25rem;
        }
        
        .option-content p {
            color: #9C9488;
            font-size: 0.875rem;
        }
        
        /* Navigation */
        .quiz-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }
        
        .nav-btn {
            padding: 0.75rem 2rem;
            border: 1px solid rgba(184, 115, 51, 0.3);
            background: transparent;
            color: #C4BCAD;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .nav-btn:hover {
            background: rgba(184, 115, 51, 0.1);
            color: #FFB347;
            border-color: #B87333;
        }
        
        .nav-btn.primary {
            background: #B87333;
            color: #0F0E0C;
            border-color: #B87333;
        }
        
        .nav-btn.primary:hover {
            background: #D4904D;
            box-shadow: 0 0 20px rgba(184, 115, 51, 0.5);
        }
        
        /* Step Indicator */
        .steps {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .step {
            width: 8px;
            height: 8px;
            background: rgba(184, 115, 51, 0.3);
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .step.active {
            background: #FFB347;
            box-shadow: 0 0 10px rgba(255, 179, 71, 0.6);
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .quiz-card { padding: 2rem; }
            h2 { font-size: 1.5rem; }
            .option { padding: 1rem; }
            .option-icon { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="quiz-card">
            <div class="steps">
                <div class="step active"></div>
                <div class="step active"></div>
                <div class="step"></div>
                <div class="step"></div>
                <div class="step"></div>
            </div>
            
            <div class="question-number">Question 2 of 5</div>
            <h2>Which rooms would you like to make smart first?</h2>
            
            <div class="options">
                <div class="option selected">
                    <div class="option-icon"></div>
                    <div class="option-content">
                        <h3>Living Room</h3>
                        <p>Entertainment, lighting, and climate control</p>
                    </div>
                </div>
                
                <div class="option">
                    <div class="option-icon"></div>
                    <div class="option-content">
                        <h3>Bedroom</h3>
                        <p>Sleep optimization and morning routines</p>
                    </div>
                </div>
                
                <div class="option">
                    <div class="option-icon"></div>
                    <div class="option-content">
                        <h3>Kitchen</h3>
                        <p>Cooking assistance and energy efficiency</p>
                    </div>
                </div>
                
                <div class="option">
                    <div class="option-icon"></div>
                    <div class="option-content">
                        <h3>Whole Home</h3>
                        <p>Complete smart home transformation</p>
                    </div>
                </div>
            </div>
            
            <div class="quiz-nav">
                <button class="nav-btn">Previous</button>
                <button class="nav-btn primary">Continue</button>
            </div>
        </div>
    </div>
</body>
</html>
